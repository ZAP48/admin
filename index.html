<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ZAP48 - LIVE EDITOR PRO</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <style>
    /* --- TEMA BRAT CORE --- */
    :root {
      --primary: #8ACE00; --black: #000000; --white: #ffffff; --bg: #f4f4f4;
      --border: 2px solid #000; --shadow: 4px 4px 0px #000; --shadow-sm: 2px 2px 0px #000;
      --radius: 16px; --admin-color: #e91e63;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    body { background-color: var(--bg); color: var(--black); font-family: 'Roboto', sans-serif; padding-bottom: 90px; overflow-x: hidden; }
    h1, h2, h3, h4, .font-head { font-family: 'Montserrat', sans-serif; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; }

    /* LAYOUT BASE */
    .header { background: var(--bg); padding: 15px 20px; position: sticky; top: 0; z-index: 100; border-bottom: var(--border); display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.5rem; color: var(--black); font-style: italic; }
    .logo span { color: var(--primary); }
    .container { padding: 0 20px; max-width: 600px; margin: 0 auto; }
    .view-section { display: none; padding-top: 20px; }
    .view-section.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* CARDS & GRIDS */
    .card { background: #fff; border: var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 15px; margin-bottom: 15px; position: relative; }
    .section-title { font-size: 1.2rem; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
    .section-title::before { content: ''; width: 12px; height: 12px; background: var(--primary); border: 2px solid #000; }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; align-items: start; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .item-card { text-align: center; cursor: pointer; transition: transform 0.1s; display: flex; flex-direction: column; gap: 6px; }
    .item-card:active { transform: scale(0.95); }
    .item-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border: var(--border); border-radius: 12px; background: #fff; display: block; }
    .item-name { font-weight: 900; font-size: 0.8rem; line-height: 1.2; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

    /* HERO BANNER (FOTO/VIDEO) */
    .hero { position: relative; height: 320px; border-radius: var(--radius); border: var(--border); box-shadow: var(--shadow); margin-bottom: 30px; overflow: hidden; background: #000; color: #fff; cursor: pointer; transition: transform 0.2s;}
    .hero:active { transform: scale(0.98); }
    .hero-media { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; z-index: 1; pointer-events: none; }
    .hero-content { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; z-index: 2; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); pointer-events: none; }
    .tag { background: var(--primary); color: #000; font-weight: 900; font-size: 0.7rem; padding: 4px 10px; border-radius: 4px; display: inline-block; margin-bottom: 8px; border: 1px solid #000; }

    .scroll-filters { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0 15px 0; }
    .btn-pill { white-space: nowrap; padding: 8px 16px; border: var(--border); border-radius: 50px; background: #fff; font-weight: 700; font-size: 0.8rem; cursor: pointer; box-shadow: 2px 2px 0 #000; }
    .btn-pill.active { background: var(--primary); }
    .btn-filter { flex: 1; padding: 12px; background: #fff; border: var(--border); border-radius: 10px; font-weight: 900; cursor: pointer; box-shadow: var(--shadow-sm); }
    .btn-filter.active { background: var(--black); color: var(--primary); }
    .btn-main { background: var(--primary); color: #000; border: var(--border); padding: 14px; border-radius: var(--radius); font-weight: 900; width: 100%; cursor: pointer; box-shadow: var(--shadow-sm); text-transform: uppercase; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 8px; }
    
    input, select, textarea { width: 100%; padding: 12px; border: var(--border); border-radius: 8px; font-family: inherit; font-weight: 700; margin-top: 5px; background: #fff; }

    /* MODAIS */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: none; justify-content: center; align-items: flex-end; }
    .modal-overlay.active { display: flex; animation: fadeModal 0.2s forwards; }
    @keyframes fadeModal { from{opacity:0;} to{opacity:1;} }
    .modal-content { background: var(--bg); width: 100%; max-width: 600px; height: 92vh; border-radius: 30px 30px 0 0; border: var(--border); overflow-y: auto; position: relative; animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); padding-bottom: 30px; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .close-btn { position: absolute; top: 15px; right: 15px; background: #000; color: #fff; border: none; width: 32px; height: 32px; border-radius: 50%; z-index: 10; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

    .tabs { display: flex; border-bottom: var(--border); background: #fff; position: sticky; top: 0; z-index: 5; }
    .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-weight: 900; font-size: 0.75rem; color: #aaa; cursor: pointer; text-transform: uppercase; border-bottom: 4px solid transparent; }
    .tab-btn.active { color: #000; border-bottom-color: var(--primary); }
    .tab-pane, .modal-section { display: none; padding: 20px; }
    .tab-pane.active, .modal-section.active { display: block; }

    /* COMPONENTES DE EXIBIÇÃO */
    .part-card { background: #fff; border: var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; box-shadow: var(--shadow-sm); }
    .part-header { background: #fff; padding: 12px 15px; font-weight: 900; font-size: 0.8rem; text-transform: uppercase; border-bottom: var(--border); display: flex; justify-content: space-between; align-items: center; }
    .part-header::after { content: ''; width: 10px; height: 10px; background: var(--primary); border: 2px solid #000; display: block; }
    .part-row { padding: 12px 15px; border-bottom: 1px dashed #ccc; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; font-weight: 600; }
    .label-brat { display: inline-flex; align-items: center; gap: 5px; font-size: 0.6rem; padding: 4px 8px; border-radius: 20px; font-weight: 900; text-transform: uppercase; border: 2px solid #000; margin-left: 5px; box-shadow: 2px 2px 0 #000; white-space: nowrap; }
    .label-brat.is-aside { background: var(--primary); color: #000; } .label-brat.is-bside { background: #000; color: var(--primary); }
    .label-brat.is-center { background: #fff; color: #000; border-color: #000; } .label-brat.is-unit { background: #eee; color: #555; }

    .formation-group { background: #fff; border: var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
    .formation-header { padding: 15px; background: #fff; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
    .formation-title { font-size: 0.85rem !important; font-weight: 800 !important; display: flex; align-items: center; gap: 10px; margin: 0 !important; text-transform: uppercase; }
    .formation-arrow { transition: transform 0.3s ease; }
    .formation-group.open .formation-arrow { transform: rotate(180deg); }
    .formation-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; background: #fafafa; }
    .formation-group.open .formation-content { max-height: 2000px; padding: 15px; border-top: var(--border); }
    
    .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; }
    .member-card-static { text-align: center; position: relative; cursor: pointer; }
    .member-card-static img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #ccc; object-fit: cover; background: #fff; transition: 0.2s; }
    .member-card-static.is-center img { border-color: var(--primary); box-shadow: 0 0 0 3px #000; transform: scale(1.05); }
    .member-info h3 { font-size: 0.65rem; font-weight: 900; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* STAGES */
    .stage-card { background: #fff; border: var(--border); border-radius: var(--radius); padding: 15px; margin-bottom: 15px; display: flex; gap: 15px; align-items: center; box-shadow: var(--shadow); }
    .stage-cover { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #000; object-fit: cover; }
    .stage-info { flex: 1; }
    .stage-title { font-weight: 900; font-size: 1rem; text-transform: uppercase; line-height: 1.1; }
    .stage-badge { font-size: 0.6rem; padding: 2px 6px; background: var(--black); color: var(--primary); border-radius: 4px; font-weight: 900; display: inline-block; margin-top: 6px; }

    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: #000; display: flex; border-top: 4px solid var(--primary); z-index: 1000; }
    .nav-item { flex: 1; background: none; border: none; color: #666; font-size: 0.6rem; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .nav-item.active { color: var(--primary); }
    .nav-item i { font-size: 1.4rem; margin-bottom: 4px; }

    /* LOADING & ADMIN STYLES */
    #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 30000; display: none; justify-content: center; align-items: center; flex-direction: column; }
    .spinner { border: 6px solid #f3f3f3; border-top: 6px solid var(--admin-color); border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .btn-edit-inline { position:absolute; top:15px; left:15px; background:var(--admin-color); color:#fff; border:2px solid #000; width:40px; height:40px; border-radius:50%; z-index:50; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow: 2px 2px 0 #000; font-size: 1.1rem; }
    .btn-edit-news { position:absolute; top:10px; right:10px; background:var(--admin-color); color:#fff; border:1px solid #000; border-radius:4px; padding:4px 8px; font-size:0.7rem; font-weight:bold; cursor:pointer; }
    .btn-admin-nav { background: var(--admin-color); color: #fff; border: 2px solid #000; border-radius: 8px; padding: 6px 12px; font-weight: 900; font-size: 0.7rem; cursor: pointer; box-shadow: 2px 2px 0 #000; display: flex; gap: 5px; align-items: center; }
    
    #admin-editor-overlay .modal-content, #shuffle-modal .modal-content { background: #fff; border: 4px solid var(--admin-color); padding-bottom: 80px; }
    .admin-form-group { margin-bottom: 12px; }
    .admin-form-group label { display: block; font-size: 0.7rem; font-weight: 900; color: var(--admin-color); text-transform: uppercase; margin-bottom: 4px; }
    .admin-form-group input, .admin-form-group textarea, .admin-form-group select { border-color: var(--admin-color); border-width: 2px; }
    .admin-save-btn { background: var(--admin-color); color: #fff; width: 100%; padding: 15px; border: 2px solid #000; font-weight: 900; font-size: 1rem; cursor: pointer; border-radius: 8px; margin-top: 10px; box-shadow: 4px 4px 0 #000; display:flex; justify-content:center; align-items:center; gap:8px;}
    .admin-delete-btn { background: #ff4757; color: #fff; width: 100%; padding: 12px; border: 2px solid #000; font-weight: 900; cursor: pointer; border-radius: 8px; margin-top: 10px; }

    /* MULTI-DELETE & SHUFFLE LISTS */
    .md-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; }
    .md-item input[type="checkbox"] { width: 20px; height: 20px; border: 2px solid #000; margin: 0; }
    .md-item span { font-size: 0.85rem; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* EDITOR VISUAL DE PARTICIPAÇÕES */
    .admin-parts-list { background: #fafafa; border: 2px dashed #ccc; padding: 10px; border-radius: 8px; max-height: 200px; overflow-y: auto; margin-bottom: 10px; }
    .part-admin-item { background: #fff; border: 1px solid #ddd; padding: 8px; border-radius: 6px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .part-admin-item .info { font-size: 0.75rem; font-weight: 700; display:flex; flex-direction:column; gap:2px; }
    .part-admin-item .badge { font-size: 0.55rem; background: var(--admin-color); color: #fff; padding: 2px 4px; border-radius: 4px; font-weight: 900; text-transform: uppercase; }
    
    /* HISTORICO DE TIMES UI */
    .team-history-timeline { border-left: 2px solid #ddd; padding-left: 15px; margin-top: 10px; }
    .team-history-item { position: relative; margin-bottom: 10px; font-size: 0.8rem; font-weight: 700; }
    .team-history-item::before { content: ''; position: absolute; left: -21px; top: 2px; width: 10px; height: 10px; background: var(--primary); border: 2px solid #000; border-radius: 50%; }
    .team-history-date { font-size: 0.6rem; color: #666; font-weight: 900; }
  </style>
</head>

<body>

  <div id="loading-overlay"><div class="spinner"></div><div class="loading-text">Processando...</div></div>

  <div class="header">
      <div class="logo">ZAP<span>48</span> <small style="font-size:0.5em;color:var(--admin-color);vertical-align:middle;">[ADMIN]</small></div>
      <button class="btn-admin-nav" onclick="openMultiDelete()"><i class="fas fa-trash-alt"></i> GERENCIAR</button>
  </div>

  <div id="view-home" class="view-section active container">
    <div class="hero" id="hero-container">
      <button class="btn-edit-inline" style="z-index: 50;" onclick="event.stopPropagation(); openAdminEditor('Banners', (loadedBanner ? loadedBanner.id : null), loadedBanner)" title="Editar Banner"><i class="fas fa-pencil-alt"></i></button>
      <div id="hero-media-wrapper"></div>
      <div class="hero-content">
        <span class="tag" id="hero-tag">DESTAQUE</span>
        <h1 id="hero-title" class="font-head" style="font-size: 1.5rem; line-height: 1.1;">...</h1>
      </div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3 class="section-title" style="margin:0;">Notícias</h3>
        <button onclick="openAdminEditor('Noticias', null)" style="background:var(--admin-color); color:#fff; border:1px solid #000; padding:5px 10px; font-weight:bold; border-radius:4px; cursor:pointer;">+ Nova</button>
    </div>
    <div id="news-list"></div>
  </div>

  <div id="view-disco" class="view-section container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3 class="section-title" style="margin:0;">Discografia</h3>
        <button onclick="openAdminEditor('Discografia', null)" style="background:var(--admin-color); color:#fff; border:1px solid #000; padding:5px 10px; font-weight:bold; border-radius:4px; cursor:pointer;">+ Novo</button>
    </div>
    <div id="disco-grid" class="grid-2"></div>
  </div>

  <div id="view-members" class="view-section container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3 class="section-title" style="margin:0;">Membros</h3>
        <div>
            <button onclick="openShuffleModal()" style="background:#000; color:var(--primary); border:1px solid var(--primary); padding:5px 10px; font-weight:bold; border-radius:4px; cursor:pointer; margin-right:5px;">🔀 SHUFFLE / PROMOVER</button>
            <button onclick="openAdminEditor('Membros', null)" style="background:var(--admin-color); color:#fff; border:1px solid #000; padding:5px 10px; font-weight:bold; border-radius:4px; cursor:pointer;">+ Novo</button>
        </div>
    </div>
    <div style="display:flex; gap:10px; margin-bottom:15px;">
      <button class="btn-filter active" onclick="setMemberFilter('gen', this)">Geração</button>
      <button class="btn-filter" onclick="setMemberFilter('team', this)">Time</button>
    </div>
    <div id="scroll-buttons" class="scroll-filters"></div>
    <div id="members-container"></div>
  </div>

  <div id="view-stages" class="view-section container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3 class="section-title" style="margin:0;">Stages</h3>
        <button onclick="openAdminEditor('Stages', null)" style="background:var(--admin-color); color:#fff; border:1px solid #000; padding:5px 10px; font-weight:bold; border-radius:4px; cursor:pointer;">+ Novo</button>
    </div>
    <div id="stages-list"></div>
  </div>

  <div id="member-modal" class="modal-overlay" onclick="if(event.target==this)closeModal('member-modal')">
    <div class="modal-content">
      <button class="btn-edit-inline" id="btn-edit-member" title="Editar Membro"><i class="fas fa-pencil-alt"></i></button>
      <button class="close-btn" onclick="closeModal('member-modal')">×</button>
      <div style="height:120px; background:#000;"></div>
      <img id="m-cover" style="width:120px; height:120px; border-radius:50%; border:4px solid var(--primary); object-fit:cover; margin:-60px auto 10px; display:block; background:#000;" src="">
      <h2 id="m-name" style="text-align:center;"></h2>
      <p id="m-team" style="text-align:center; font-weight:900; font-size:0.7rem; color:#666; margin-bottom:15px; text-transform: uppercase;"></p>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTabModal('perfil', this)">Perfil</button>
        <button class="tab-btn" onclick="switchTabModal('part', this)">Músicas</button
